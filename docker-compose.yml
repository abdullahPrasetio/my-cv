version: "3.8"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - portfolio
      - backend
    restart: always

  portfolio:
    build:
      context: .
      args:
        VITE_API_URL: /api/v1
    expose:
      - "80"
    restart: always

  backend:
    build: ./backend
    expose:
      - "4000"
    environment:
      - APP_PORT=4000
      - APP_ENV=${APP_ENV:-production}
      - DB_DRIVER=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-cvplatform}
      - DB_USER=${DB_USER:-cvuser}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - CF_R2_ACCOUNT_ID=${CF_R2_ACCOUNT_ID}
      - CF_R2_ACCESS_KEY=${CF_R2_ACCESS_KEY}
      - CF_R2_SECRET_KEY=${CF_R2_SECRET_KEY}
      - CF_R2_BUCKET=${CF_R2_BUCKET:-cv-media}
      - CF_R2_PUBLIC_URL=${CF_R2_PUBLIC_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  admin:
    build: ./admin
    expose:
      - "3000"
    environment:
      - NUXT_PUBLIC_API_URL=${NUXT_PUBLIC_API_URL:-https://domain.com/api/v1}
    restart: always

  postgres:
    image: postgres:16-alpine
    expose:
      - "5432"
    environment:
      - POSTGRES_DB=${DB_NAME:-cvplatform}
      - POSTGRES_USER=${DB_USER:-cvuser}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cvuser} -d ${DB_NAME:-cvplatform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    depends_on:
      - nginx
      - admin
    restart: always

volumes:
  pgdata:
